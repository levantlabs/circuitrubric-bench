prompts:
  - id: short
    text: "Design an NMOS Gilbert cell with resistor loads."
  - id: verbose
    text: "Design an NMOS Gilbert cell with resistor loads: a lower NMOS transconductance pair on a tail source driving two cross-connected upper switching pairs, whose differential outputs are taken across resistor loads to the supply."
  - id: spec
    text: "Design an NMOS Gilbert cell with resistor loads. Use exactly seven transistors and two resistors: M1 is an NMOS transistor with drain at voutp, gate at vlop, source at n_a, bulk to ground. M2 is an NMOS transistor with drain at voutn, gate at vlon, source at n_a, bulk to ground. M3 is an NMOS transistor with drain at voutn, gate at vlop, source at n_b, bulk to ground. M4 is an NMOS transistor with drain at voutp, gate at vlon, source at n_b, bulk to ground. M5 is an NMOS transistor with drain at n_a, gate at vinp, source at ntail, bulk to ground. M6 is an NMOS transistor with drain at n_b, gate at vinn, source at ntail, bulk to ground. M7 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground. R1 is a resistor between vdd and voutp. R2 is a resistor between vdd and voutn."

prompts:
  - id: short
    text: "Design an NMOS-input telescopic cascode OTA with a fully differential output."
  - id: verbose
    text: "Design an NMOS-input telescopic cascode OTA with fully differential outputs: an NMOS input pair on a tail source, cascoded by NMOS devices into cascoded PMOS current-source loads, producing differential rather than single-ended outputs."
  - id: spec
    text: "Design an NMOS-input telescopic cascode OTA with a fully differential output. Use exactly nine transistors: M1 is an NMOS transistor with drain at n_a1, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at n_a2, gate at vinn, source at ntail, bulk to ground. M3 is an NMOS transistor with drain at voutn, gate at vcn, source at n_a1, bulk to ground. M4 is an NMOS transistor with drain at voutp, gate at vcn, source at n_a2, bulk to ground. M5 is a PMOS transistor with drain at voutn, gate at vcp, source at n_b1, bulk to VDD. M6 is a PMOS transistor with drain at voutp, gate at vcp, source at n_b2, bulk to VDD. M7 is a PMOS transistor with drain at n_b1, gate at vbp, source at VDD, bulk to VDD. M8 is a PMOS transistor with drain at n_b2, gate at vbp, source at VDD, bulk to VDD. M9 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground."

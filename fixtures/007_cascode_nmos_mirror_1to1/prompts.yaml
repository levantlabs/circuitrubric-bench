prompts:
  - id: short
    text: "Design a 1 to 1 cascode NMOS current mirror."
  - id: verbose
    text: "Design a 1:1 cascode NMOS current mirror: a diode-biased reference branch and a matched output branch, each a mirror transistor with a cascode transistor stacked on top to raise output impedance, copying the reference current one-to-one."
  - id: spec
    text: "Design a 1 to 1 cascode NMOS current mirror. Use exactly four transistors: M1 is an NMOS transistor with drain at n1, gate at n1, source to ground, bulk to ground. M2 is an NMOS transistor with drain at iref, gate at iref, source at n1, bulk to ground. M3 is an NMOS transistor with drain at n2, gate at n1, source to ground, bulk to ground. M4 is an NMOS transistor with drain at iout, gate at iref, source at n2, bulk to ground."

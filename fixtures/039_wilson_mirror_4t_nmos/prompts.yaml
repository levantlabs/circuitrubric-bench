prompts:
  - id: short
    text: "Design an improved 4-transistor Wilson current mirror with NMOS devices."
  - id: verbose
    text: "Design an improved 4-transistor Wilson current mirror with NMOS devices: the standard Wilson with an added diode-connected balance device on the reference leg to match the drain-source voltages of the mirror pair."
  - id: spec
    text: "Design an improved 4-transistor Wilson current mirror with NMOS devices. Use exactly four transistors: M1 is an NMOS transistor with drain at n_xref, gate at n1, source to ground, bulk to ground. M2 is an NMOS transistor with drain at iout, gate at iref, source at n1, bulk to ground. M3 is an NMOS transistor with drain at n1, gate at n1, source to ground, bulk to ground. M4 is an NMOS transistor with drain at iref, gate at iref, source at n_xref, bulk to ground."

prompts:
  - id: short
    text: "Design a PMOS common-source amplifier with an NMOS current-source load."
  - id: verbose
    text: "Design a PMOS common-source amplifier with an NMOS current-source load: a common-source input transistor driving the output, actively loaded by an NMOS current source to ground."
  - id: spec
    text: "Design a PMOS common-source amplifier with an NMOS current-source load. Use exactly two transistors: M1 is a PMOS transistor with drain at vout, gate at vin, source at VDD, bulk to VDD. M2 is an NMOS transistor with drain at vout, gate at vbias, source to ground, bulk to ground."

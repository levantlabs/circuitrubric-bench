prompts:
  - id: short
    text: "Design a differential amplifier with NMOS inputs, a cascode PMOS current-mirror load, and single-ended output."
  - id: verbose
    text: "Design a differential amplifier with an NMOS input pair on a tail current source to ground, loaded by a cascode PMOS current mirror that converts the differential signal to a single-ended output."
  - id: spec
    text: "Design a differential amplifier with NMOS inputs, a cascode PMOS current-mirror load, and single-ended output. Use exactly seven transistors: M1 is an NMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to ground. M3 is a PMOS transistor with drain at n1, gate at n1, source at VDD, bulk to VDD. M4 is a PMOS transistor with drain at voutn, gate at voutn, source at n1, bulk to VDD. M5 is a PMOS transistor with drain at n2, gate at n1, source at VDD, bulk to VDD. M6 is a PMOS transistor with drain at voutp, gate at voutn, source at n2, bulk to VDD. M7 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground."

prompts:
  - id: short
    text: "Design a PMOS-input telescopic cascode OTA with a fully differential output."
  - id: verbose
    text: "Design a PMOS-input telescopic cascode OTA with fully differential outputs: a PMOS input pair on a tail source, cascoded by PMOS devices into cascoded NMOS current-source loads, producing differential rather than single-ended outputs."
  - id: spec
    text: "Design a PMOS-input telescopic cascode OTA with a fully differential output. Use exactly nine transistors: M1 is a PMOS transistor with drain at p_a1, gate at vinp, source at ntail, bulk to VDD. M2 is a PMOS transistor with drain at p_a2, gate at vinn, source at ntail, bulk to VDD. M3 is a PMOS transistor with drain at voutn, gate at vcp, source at p_a1, bulk to VDD. M4 is a PMOS transistor with drain at voutp, gate at vcp, source at p_a2, bulk to VDD. M5 is an NMOS transistor with drain at voutn, gate at vcn, source at n_b1, bulk to ground. M6 is an NMOS transistor with drain at voutp, gate at vcn, source at n_b2, bulk to ground. M7 is an NMOS transistor with drain at n_b1, gate at vbn, source to ground, bulk to ground. M8 is an NMOS transistor with drain at n_b2, gate at vbn, source to ground, bulk to ground. M9 is a PMOS transistor with drain at ntail, gate at vbias, source at VDD, bulk to VDD."

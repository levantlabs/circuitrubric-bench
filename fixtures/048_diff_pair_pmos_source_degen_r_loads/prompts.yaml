prompts:
  - id: short
    text: "Design a PMOS source-degenerated differential pair with resistor loads."
  - id: verbose
    text: "Design a PMOS source-degenerated differential pair with resistor loads: a matched PMOS input pair, each with its own current source from the supply and a degeneration resistor bridging their source nodes, with resistor loads to ground."
  - id: spec
    text: "Design a PMOS source-degenerated differential pair with resistor loads. Use exactly four transistors and three resistors: M1 is a PMOS transistor with drain at voutn, gate at vinp, source at ns1, bulk to VDD. M2 is a PMOS transistor with drain at voutp, gate at vinn, source at ns2, bulk to VDD. M3 is a PMOS transistor with drain at ns1, gate at vbias, source at VDD, bulk to VDD. M4 is a PMOS transistor with drain at ns2, gate at vbias, source at VDD, bulk to VDD. R1 is a resistor between voutn and 0. R2 is a resistor between voutp and 0. R3 is a resistor between ns1 and ns2."

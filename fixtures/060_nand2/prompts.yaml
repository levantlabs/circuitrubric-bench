prompts:
  - id: short
    text: "Design a two-input CMOS NAND gate."
  - id: verbose
    text: "Design a two-input CMOS NAND gate: two series NMOS pull-down devices to ground and two parallel PMOS pull-up devices from the supply, with each input driving one NMOS and one PMOS."
  - id: spec
    text: "Design a two-input CMOS NAND gate. Use exactly four transistors: M1 is an NMOS with drain at vout, gate at a, source at the internal series node (call it mid), bulk to ground. M2 is an NMOS with drain at mid, gate at b, source to ground, bulk to ground. M3 is a PMOS with drain at vout, gate at a, source at VDD, bulk to VDD. M4 is a PMOS with drain at vout, gate at b, source at VDD, bulk to VDD."

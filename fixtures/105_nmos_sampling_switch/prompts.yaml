prompts:
  - id: short
    text: "Design an NMOS sampling switch with a hold capacitor."
  - id: verbose
    text: "Design an NMOS sampling switch with a hold capacitor: a single NMOS pass transistor gated by a clock that charges a hold capacitor at the output, which retains the sampled input voltage."
  - id: spec
    text: "Design an NMOS sampling switch with a hold capacitor. Use exactly one transistor and one capacitor: M1 is an NMOS transistor with drain at vout, gate at clk, source at vin, bulk to ground. Ch is a capacitor between vout and ground."

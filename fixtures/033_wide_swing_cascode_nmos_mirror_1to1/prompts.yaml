prompts:
  - id: short
    text: "Design a 1 to 1 wide-swing cascode NMOS current mirror."
  - id: verbose
    text: "Design a 1:1 wide-swing cascode NMOS current mirror: a cascoded mirror biased for minimal output headroom, using a separate diode-connected device to set the cascode bias, copying the reference current one-to-one."
  - id: spec
    text: "Design a 1 to 1 wide-swing cascode NMOS current mirror. Use exactly five transistors: M5 is an NMOS transistor with drain at vbias, gate at vbias, source to ground, bulk to ground. M1 is an NMOS transistor with drain at iref, gate at vbias, source at n1, bulk to ground. M2 is an NMOS transistor with drain at n1, gate at iref, source to ground, bulk to ground. M3 is an NMOS transistor with drain at iout, gate at vbias, source at n2, bulk to ground. M4 is an NMOS transistor with drain at n2, gate at iref, source to ground, bulk to ground."

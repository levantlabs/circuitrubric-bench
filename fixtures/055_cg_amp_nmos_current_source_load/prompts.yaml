prompts:
  - id: short
    text: "Design an NMOS common-gate amplifier with a PMOS current-source load."
  - id: verbose
    text: "Design an NMOS common-gate amplifier with a PMOS current-source load: a fixed-bias common-gate transistor taking its input at the source, actively loaded by a PMOS current source from the supply."
  - id: spec
    text: "Design an NMOS common-gate amplifier with a PMOS current-source load. Use exactly two transistors: M1 is the NMOS common-gate device with drain at vout, gate at vbias, source at vin, bulk to ground. M2 is the PMOS current-source load with drain at vout, gate at vbp, source at VDD, bulk to VDD."

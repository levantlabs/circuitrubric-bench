prompts:
  - id: short
    text: "Design a 5T OTA with NMOS inputs."
  - id: verbose
    text: "Design a single-stage differential amplifier with an NMOS input pair, a PMOS current-mirror load, single-ended output, and an NMOS tail current source to ground."
  - id: spec
    text: "Design a 5T OTA with NMOS inputs. Use exactly five transistors: M1 is an NMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to ground. M3 is a PMOS transistor with drain at voutn, gate at voutn, source at VDD, bulk to VDD. M4 is a PMOS transistor with drain at voutp, gate at voutn, source at VDD, bulk to VDD. M5 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground."

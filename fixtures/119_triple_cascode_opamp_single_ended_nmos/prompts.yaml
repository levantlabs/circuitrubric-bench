prompts:
  - id: short
    text: "Design an NMOS-input triple-cascode opamp with a single-ended output."
  - id: verbose
    text: "Design an NMOS-input triple-cascode op-amp with single-ended output: an NMOS input pair on a tail source with two stacked NMOS cascode levels, loaded by a triple-stacked PMOS cascode current mirror that converts to a single-ended output."
  - id: spec
    text: "Design an NMOS-input triple-cascode opamp with a single-ended output. Use exactly thirteen transistors: M1 is an NMOS transistor with drain at n_a1, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at n_a2, gate at vinn, source at ntail, bulk to ground. M3 is an NMOS transistor with drain at n_b1, gate at vcn1, source at n_a1, bulk to ground. M4 is an NMOS transistor with drain at n_b2, gate at vcn1, source at n_a2, bulk to ground. M5 is an NMOS transistor with drain at voutn, gate at vcn2, source at n_b1, bulk to ground. M6 is an NMOS transistor with drain at voutp, gate at vcn2, source at n_b2, bulk to ground. M7 is a PMOS transistor with drain at voutn, gate at voutn, source at p_b1, bulk to VDD. M8 is a PMOS transistor with drain at voutp, gate at voutn, source at p_b2, bulk to VDD. M9 is a PMOS transistor with drain at p_b1, gate at p_b1, source at p_a1, bulk to VDD. M10 is a PMOS transistor with drain at p_b2, gate at p_b1, source at p_a2, bulk to VDD. M11 is a PMOS transistor with drain at p_a1, gate at p_a1, source at VDD, bulk to VDD. M12 is a PMOS transistor with drain at p_a2, gate at p_a1, source at VDD, bulk to VDD. M13 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground."

prompts:
  - id: short
    text: "Design an improved 4-transistor Wilson current mirror with PMOS devices."
  - id: verbose
    text: "Design an improved 4-transistor Wilson current mirror with PMOS devices: the standard Wilson with an added diode-connected balance device on the reference leg to match the drain-source voltages of the mirror pair."
  - id: spec
    text: "Design an improved 4-transistor Wilson current mirror with PMOS devices. Use exactly four transistors: M1 is a PMOS transistor with drain at n_xref, gate at n1, source at VDD, bulk to VDD. M2 is a PMOS transistor with drain at iout, gate at iref, source at n1, bulk to VDD. M3 is a PMOS transistor with drain at n1, gate at n1, source at VDD, bulk to VDD. M4 is a PMOS transistor with drain at iref, gate at iref, source at n_xref, bulk to VDD."

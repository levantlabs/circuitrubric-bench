prompts:
  - id: short
    text: "Design a telescopic cascode OTA with PMOS inputs and single-ended output."
  - id: verbose
    text: "Design a telescopic cascode OTA with PMOS inputs and single-ended output: a PMOS input pair on a tail source, cascoded by PMOS devices into a cascoded NMOS current-mirror load, stacking input and load cascodes in one high-gain branch."
  - id: spec
    text: "Design a telescopic cascode OTA with PMOS inputs and single-ended output. Use exactly nine transistors: M1 is a PMOS transistor with drain at n_a1, gate at vinp, source at ntail, bulk to VDD. M2 is a PMOS transistor with drain at n_a2, gate at vinn, source at ntail, bulk to VDD. M3 is a PMOS transistor with drain at voutn, gate at vcasc_p, source at n_a1, bulk to VDD. M4 is a PMOS transistor with drain at voutp, gate at vcasc_p, source at n_a2, bulk to VDD. M5 is an NMOS transistor with drain at voutn, gate at voutn, source at n_b1, bulk to ground. M6 is an NMOS transistor with drain at voutp, gate at voutn, source at n_b2, bulk to ground. M7 is an NMOS transistor with drain at n_b1, gate at n_b1, source to ground, bulk to ground. M8 is an NMOS transistor with drain at n_b2, gate at n_b1, source to ground, bulk to ground. M9 is a PMOS transistor with drain at ntail, gate at vbias, source at VDD, bulk to VDD."

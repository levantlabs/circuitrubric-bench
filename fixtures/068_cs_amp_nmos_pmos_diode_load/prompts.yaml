prompts:
  - id: short
    text: "Design an NMOS common-source amplifier with a PMOS diode-connected load."
  - id: verbose
    text: "Design an NMOS common-source amplifier with a PMOS diode-connected load: a common-source input transistor driving the output, loaded by a diode-connected PMOS device to the supply."
  - id: spec
    text: "Design an NMOS common-source amplifier with a PMOS diode-connected load. Use exactly two transistors: M1 is an NMOS transistor with drain at vout, gate at vin, source to ground, bulk to ground. M2 is a PMOS transistor with drain at vout, gate at vout, source at VDD, bulk to VDD."

prompts:
  - id: short
    text: "Design a PMOS common-source amplifier with a resistor load."
  - id: verbose
    text: "Design a PMOS common-source amplifier with a resistor load: a single common-source transistor driving the output, with a resistor pulling the output down to ground."
  - id: spec
    text: "Design a PMOS common-source amplifier with a resistor load. Use exactly one transistor and one resistor: M1 is a PMOS transistor with drain at vout, gate at vin, source at VDD, bulk to VDD. R1 is a resistor between vout and 0."

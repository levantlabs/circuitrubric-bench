prompts:
  - id: short
    text: "Design a 3-stage differential ring oscillator using PMOS differential amplifiers with resistor loads."
  - id: verbose
    text: "Design a 3-stage differential ring oscillator from PMOS differential amplifiers with resistor loads: three identical resistor-loaded PMOS differential stages, each on its own tail source, connected in a loop with the final differential output fed back to the first stage."
  - id: spec
    text: "Design a 3-stage differential ring oscillator using PMOS differential amplifiers with resistor loads. Use exactly nine transistors and six resistors arranged as three identical differential stages in a loop. Stage 1: M1 is a PMOS transistor with drain at v1n, gate at voutn, source at nt1, bulk to VDD; M2 is a PMOS transistor with drain at v1p, gate at voutp, source at nt1, bulk to VDD; R1 is a resistor between v1n and ground; R2 is a resistor between v1p and ground; M3 is a PMOS transistor with drain at nt1, gate at vbias, source at VDD, bulk to VDD. Stage 2: M4 is a PMOS transistor with drain at v2n, gate at v1n, source at nt2, bulk to VDD; M5 is a PMOS transistor with drain at v2p, gate at v1p, source at nt2, bulk to VDD; R3 is a resistor between v2n and ground; R4 is a resistor between v2p and ground; M6 is a PMOS transistor with drain at nt2, gate at vbias, source at VDD, bulk to VDD. Stage 3: M7 is a PMOS transistor with drain at voutn, gate at v2n, source at nt3, bulk to VDD; M8 is a PMOS transistor with drain at voutp, gate at v2p, source at nt3, bulk to VDD; R5 is a resistor between voutn and ground; R6 is a resistor between voutp and ground; M9 is a PMOS transistor with drain at nt3, gate at vbias, source at VDD, bulk to VDD."

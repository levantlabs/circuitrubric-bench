prompts:
  - id: short
    text: "Design an NMOS differential amplifier with PMOS current-source loads."
  - id: verbose
    text: "Design an NMOS differential amplifier with PMOS current-source loads: a matched NMOS input pair on a tail current source to ground, each output actively loaded by a PMOS current source from the supply, giving differential outputs."
  - id: spec
    text: "Design an NMOS differential amplifier with PMOS current-source loads. Use exactly five transistors: M1 is an NMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to ground. M3 is a PMOS transistor with drain at voutn, gate at vbp, source at VDD, bulk to VDD. M4 is a PMOS transistor with drain at voutp, gate at vbp, source at VDD, bulk to VDD. M5 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground."

prompts:
  - id: short
    text: "Design an NMOS source follower with a current-source load."
  - id: verbose
    text: "Design an NMOS source follower with a current-source load: a common-drain transistor whose source drives the output, biased by an NMOS current source pulling to ground."
  - id: spec
    text: "Design an NMOS source follower with a current-source load. Use exactly two transistors: M1 is an NMOS transistor with drain at vdd, gate at vin, source at vout, bulk to ground. M2 is an NMOS transistor with drain at vout, gate at vbias, source to ground, bulk to ground."

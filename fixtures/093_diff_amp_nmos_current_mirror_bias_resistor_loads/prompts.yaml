prompts:
  - id: short
    text: "Design an NMOS differential amplifier with resistor loads and a current-mirror tail bias."
  - id: verbose
    text: "Design an NMOS differential amplifier with resistor loads and a current-mirror tail bias: a resistor-loaded NMOS input pair whose tail current is set by an NMOS current mirror referenced through a bias resistor from the supply."
  - id: spec
    text: "Design an NMOS differential amplifier with resistor loads and a current-mirror tail bias. Use exactly four transistors and three resistors: M1 is an NMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to ground. R1 is a resistor between vdd and voutn. R2 is a resistor between vdd and voutp. M3 is an NMOS transistor with drain at ntail, gate at nmir, source to ground, bulk to ground. M4 is an NMOS transistor with drain at nmir, gate at nmir, source to ground, bulk to ground. Rbias is a resistor between vdd and nmir."

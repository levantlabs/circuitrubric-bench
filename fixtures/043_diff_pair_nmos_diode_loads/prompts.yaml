prompts:
  - id: short
    text: "Design an NMOS differential pair with PMOS diode-connected loads."
  - id: verbose
    text: "Design an NMOS differential pair with PMOS diode-connected loads: a matched NMOS input pair on a tail current source to ground, each output loaded by a diode-connected PMOS device to the supply."
  - id: spec
    text: "Design an NMOS differential pair with PMOS diode-connected loads. Use exactly five transistors: M1 is an NMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to ground. M3 is a PMOS transistor with drain at voutn, gate at voutn, source at VDD, bulk to VDD. M4 is a PMOS transistor with drain at voutp, gate at voutp, source at VDD, bulk to VDD. M5 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground."

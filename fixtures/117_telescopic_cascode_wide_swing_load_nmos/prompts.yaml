prompts:
  - id: short
    text: "Design an NMOS-input telescopic cascode amplifier with a wide-swing PMOS cascode mirror load and a single-ended output."
  - id: verbose
    text: "Design an NMOS-input telescopic cascode amplifier with a wide-swing PMOS cascode mirror load and single-ended output: an NMOS input pair on a tail source, cascoded by NMOS devices, loaded by a wide-swing cascoded PMOS current mirror."
  - id: spec
    text: "Design an NMOS-input telescopic cascode amplifier with a wide-swing PMOS cascode mirror load and a single-ended output. Use exactly nine transistors: M1 is an NMOS transistor with drain at n_a1, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at n_a2, gate at vinn, source at ntail, bulk to ground. M3 is an NMOS transistor with drain at voutn, gate at vcasc_n, source at n_a1, bulk to ground. M4 is an NMOS transistor with drain at voutp, gate at vcasc_n, source at n_a2, bulk to ground. M5 is a PMOS transistor with drain at voutn, gate at vbcasc_p, source at p_mid1, bulk to VDD. M6 is a PMOS transistor with drain at voutp, gate at vbcasc_p, source at p_mid2, bulk to VDD. M7 is a PMOS transistor with drain at p_mid1, gate at voutn, source at VDD, bulk to VDD. M8 is a PMOS transistor with drain at p_mid2, gate at voutn, source at VDD, bulk to VDD. M9 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground."

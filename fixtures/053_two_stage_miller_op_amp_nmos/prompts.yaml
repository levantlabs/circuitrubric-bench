prompts:
  - id: short
    text: "Design a two-stage Miller-compensated op-amp with NMOS inputs and single-ended output."
  - id: verbose
    text: "Design a two-stage Miller-compensated op-amp with NMOS inputs and single-ended output: an NMOS-input differential first stage with a PMOS current-mirror load, a common-source second stage, and a Miller capacitor across the second stage."
  - id: spec
    text: "Design a two-stage Miller-compensated op-amp with NMOS inputs and single-ended output. Use exactly seven transistors and one capacitor: M1 is an NMOS transistor with drain at va, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at vb, gate at vinn, source at ntail, bulk to ground. M3 is a PMOS transistor with drain at va, gate at va, source at VDD, bulk to VDD. M4 is a PMOS transistor with drain at vb, gate at va, source at VDD, bulk to VDD. M5 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground. M6 is a PMOS transistor with drain at vout, gate at vb, source at VDD, bulk to VDD. M7 is an NMOS transistor with drain at vout, gate at vbias, source to ground, bulk to ground. Cc is a capacitor between vb and vout."

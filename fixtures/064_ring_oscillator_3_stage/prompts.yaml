prompts:
  - id: short
    text: "Design a 3-stage CMOS inverter-based ring oscillator."
  - id: verbose
    text: "Design a 3-stage CMOS inverter ring oscillator: three CMOS inverters connected in a loop, with the last stage's output fed back to the first stage's input to sustain oscillation."
  - id: spec
    text: "Design a 3-stage CMOS inverter-based ring oscillator. Use exactly six transistors arranged as three CMOS inverters in a loop. Stage 1 inverter (input vout, output v1): M1 is an NMOS transistor with drain at v1, gate at vout, source to ground, bulk to ground; M2 is a PMOS transistor with drain at v1, gate at vout, source at VDD, bulk to VDD. Stage 2 inverter (input v1, output v2): M3 is an NMOS transistor with drain at v2, gate at v1, source to ground, bulk to ground; M4 is a PMOS transistor with drain at v2, gate at v1, source at VDD, bulk to VDD. Stage 3 inverter (input v2, output vout): M5 is an NMOS transistor with drain at vout, gate at v2, source to ground, bulk to ground; M6 is a PMOS transistor with drain at vout, gate at v2, source at VDD, bulk to VDD."

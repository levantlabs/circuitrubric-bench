prompts:
  - id: short
    text: "Design a PMOS common-source amplifier with a PMOS diode-connected load."
  - id: verbose
    text: "Design a PMOS common-source amplifier with a PMOS diode-connected load: a common-source input transistor driving the output, loaded by a diode-connected PMOS device to ground."
  - id: spec
    text: "Design a PMOS common-source amplifier with a PMOS diode-connected load. Use exactly two transistors: M1 is a PMOS transistor with drain at vout, gate at vin, source at VDD, bulk to VDD. M2 is a PMOS transistor with drain to ground, gate to ground, source at vout, bulk to VDD."

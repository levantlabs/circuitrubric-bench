prompts:
  - id: short
    text: "Design a differential amplifier with PMOS inputs, a cascode NMOS current-mirror load, and single-ended output."
  - id: verbose
    text: "Design a differential amplifier with a PMOS input pair on a tail current source from the supply, loaded by a cascode NMOS current mirror that converts the differential signal to a single-ended output."
  - id: spec
    text: "Design a differential amplifier with PMOS inputs, a cascode NMOS current-mirror load, and single-ended output. Use exactly seven transistors: M1 is a PMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to VDD. M2 is a PMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to VDD. M3 is an NMOS transistor with drain at n1, gate at n1, source to ground, bulk to ground. M4 is an NMOS transistor with drain at voutn, gate at voutn, source at n1, bulk to ground. M5 is an NMOS transistor with drain at n2, gate at n1, source to ground, bulk to ground. M6 is an NMOS transistor with drain at voutp, gate at voutn, source at n2, bulk to ground. M7 is a PMOS transistor with drain at ntail, gate at vbias, source at VDD, bulk to VDD."

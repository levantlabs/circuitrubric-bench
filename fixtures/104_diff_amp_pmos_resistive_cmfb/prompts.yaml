prompts:
  - id: short
    text: "Design a PMOS differential amplifier with resistive common-mode feedback."
  - id: verbose
    text: "Design a PMOS differential amplifier with resistive common-mode feedback: a PMOS input pair with NMOS current-source loads, where a resistor network senses the output common-mode and feeds it back to the load gates."
  - id: spec
    text: "Design a PMOS differential amplifier with resistive common-mode feedback. Use exactly five transistors and two resistors: M1 is a PMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to VDD. M2 is a PMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to VDD. M3 is an NMOS transistor with drain at voutn, gate at vcm, source to ground, bulk to ground. M4 is an NMOS transistor with drain at voutp, gate at vcm, source to ground, bulk to ground. M5 is a PMOS transistor with drain at ntail, gate at vbias, source at VDD, bulk to VDD. R1 is a resistor between voutn and vcm. R2 is a resistor between voutp and vcm."

prompts:
  - id: short
    text: "Design a 3-stage differential ring oscillator using NMOS differential amplifiers with resistor loads."
  - id: verbose
    text: "Design a 3-stage differential ring oscillator from NMOS differential amplifiers with resistor loads: three identical resistor-loaded NMOS differential stages, each on its own tail source, connected in a loop with the final differential output fed back to the first stage."
  - id: spec
    text: "Design a 3-stage differential ring oscillator using NMOS differential amplifiers with resistor loads. Use exactly nine transistors and six resistors arranged as three identical differential stages in a loop. Stage 1: M1 is an NMOS transistor with drain at v1n, gate at voutn, source at nt1, bulk to ground; M2 is an NMOS transistor with drain at v1p, gate at voutp, source at nt1, bulk to ground; R1 is a resistor between vdd and v1n; R2 is a resistor between vdd and v1p; M3 is an NMOS transistor with drain at nt1, gate at vbias, source to ground, bulk to ground. Stage 2: M4 is an NMOS transistor with drain at v2n, gate at v1n, source at nt2, bulk to ground; M5 is an NMOS transistor with drain at v2p, gate at v1p, source at nt2, bulk to ground; R3 is a resistor between vdd and v2n; R4 is a resistor between vdd and v2p; M6 is an NMOS transistor with drain at nt2, gate at vbias, source to ground, bulk to ground. Stage 3: M7 is an NMOS transistor with drain at voutn, gate at v2n, source at nt3, bulk to ground; M8 is an NMOS transistor with drain at voutp, gate at v2p, source at nt3, bulk to ground; R5 is a resistor between vdd and voutn; R6 is a resistor between vdd and voutp; M9 is an NMOS transistor with drain at nt3, gate at vbias, source to ground, bulk to ground."

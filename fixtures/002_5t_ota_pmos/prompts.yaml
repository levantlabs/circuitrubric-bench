prompts:
  - id: short
    text: "Design a 5T OTA with PMOS inputs."
  - id: verbose
    text: "Design a single-stage differential amplifier with a PMOS input pair, an NMOS current-mirror load, single-ended output, and a PMOS tail current source from the supply."
  - id: spec
    text: "Design a 5T OTA with PMOS inputs. Use exactly five transistors: M1 is a PMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to VDD. M2 is a PMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to VDD. M3 is an NMOS transistor with drain at voutn, gate at voutn, source to ground, bulk to ground. M4 is an NMOS transistor with drain at voutp, gate at voutn, source to ground, bulk to ground. M5 is a PMOS transistor with drain at ntail, gate at vbias, source at VDD, bulk to VDD."

prompts:
  - id: short
    text: "Design an NMOS differential amplifier with resistive common-mode feedback."
  - id: verbose
    text: "Design an NMOS differential amplifier with resistive common-mode feedback: an NMOS input pair with PMOS current-source loads, where a resistor network senses the output common-mode and feeds it back to the load gates."
  - id: spec
    text: "Design an NMOS differential amplifier with resistive common-mode feedback. Use exactly five transistors and two resistors: M1 is an NMOS transistor with drain at voutn, gate at vinp, source at ntail, bulk to ground. M2 is an NMOS transistor with drain at voutp, gate at vinn, source at ntail, bulk to ground. M3 is a PMOS transistor with drain at voutn, gate at vcm, source at VDD, bulk to VDD. M4 is a PMOS transistor with drain at voutp, gate at vcm, source at VDD, bulk to VDD. M5 is an NMOS transistor with drain at ntail, gate at vbias, source to ground, bulk to ground. R1 is a resistor between voutn and vcm. R2 is a resistor between voutp and vcm."

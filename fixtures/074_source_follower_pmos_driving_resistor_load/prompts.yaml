prompts:
  - id: short
    text: "Design a PMOS source follower with a current-source bias and a resistive output load."
  - id: verbose
    text: "Design a PMOS source follower with a current-source bias and a resistive output load: a common-drain transistor biased by a PMOS current source from the supply, with an additional resistor load at the output."
  - id: spec
    text: "Design a PMOS source follower with a current-source bias and a resistive output load. Use exactly two transistors and one resistor: M1 is a PMOS transistor with drain to ground, gate at vin, source at vout, bulk to VDD. M2 is a PMOS transistor with drain at vout, gate at vbias, source at VDD, bulk to VDD. RL is a resistor between vdd and vout."
